name: velouscambo
description: "VelousCambo - Mechanical Bike Sharing in Phnom Penh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1

  # State Management
  provider: ^6.1.2

  # UI & Animation
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1

  # Utils
  image_picker: ^1.1.2
  intl: ^0.19.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
